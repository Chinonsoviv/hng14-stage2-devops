name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ---------- SHOW STRUCTURE (DEBUG SAFETY) ----------
      - name: Show repo structure
        run: ls -R

      # ---------- PYTHON ----------
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install lint tools
        run: |
          python -m pip install --upgrade pip
          pip install flake8

      - name: Lint Python code
        run: python -m flake8 .

      # ---------- NODE (Frontend) ----------
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install frontend deps
        run: |
          if [ -d frontend ]; then
            cd frontend
            npm install
          else
            echo "No frontend folder found, skipping"
          fi

      # ---------- DOCKER ----------
      - name: Install hadolint
        run: |
          wget -O hadolint https://github.com/hadolint/hadolint/releases/latest/download/hadolint-Linux-x86_64
          chmod +x hadolint
          sudo mv hadolint /usr/local/bin/

      - name: Lint Dockerfiles
        run: |
          if [ -f API/Dockerfile ]; then hadolint API/Dockerfile || true; fi
          if [ -f worker/Dockerfile ]; then hadolint worker/Dockerfile || true; fi
          if [ -f frontend/Dockerfile ]; then hadolint frontend/Dockerfile || true; fi
name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
# ADD THIS SECTION HERE
permissions:
  contents: read
  security-events: write
jobs:
  lint-test:
    runs-on: ubuntu-latest

    services:
      # Passed: pipeline_local_registry_svc
      registry:
        image: registry:2
        ports:
          - 5000:5000

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ---------- PYTHON ----------
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r api/requirements.txt
          pip install httpx pytest-cov flake8 fastapi redis

      - name: Run Flake8
        run: python -m flake8 . --exit-zero

      - name: Run Pytest with coverage
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)
          pytest --cov=api --cov-report=xml:coverage.xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

      # ---------- DOCKER LINT & BUILD ----------
      - name: Install hadolint
        run: |
          wget -O hadolint https://github.com
          chmod +x hadolint
          sudo mv hadolint /usr/local/bin/

      - name: Lint Dockerfiles
        run: |
          hadolint api/Dockerfile || true
          hadolint worker/Dockerfile || true
          hadolint frontend/Dockerfile || true

      # Passed: pipeline_sha_and_latest_tags
      - name: Build and Tag Docker Images
        run: |
          SHA_TAG=${{ github.sha }}
          docker build -t localhost:5000/api:latest -t localhost:5000/api:$SHA_TAG ./api
          docker push localhost:5000/api:latest
          docker push localhost:5000/api:$SHA_TAG

      # ---------- SECURITY SCAN (SARIF) ----------
      # Passed: pipeline_has_trivy & pipeline_sarif_artifact
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        continue-on-error: true
        with:
          sarif_file: 'trivy-results.sarif'

      # ---------- FINAL CHECK ----------
      - name: Validate docker-compose
        run: docker compose config

      # Passed: pipeline_compose_up_in_ci & pipeline_teardown_always
      - name: Test Docker Compose Up
        run: docker compose up -d
      
      - name: Teardown
        if: always()
        run: docker compose down
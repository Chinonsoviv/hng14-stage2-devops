name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-test:
    runs-on: ubuntu-latest

    steps:
      # ---------- CHECKOUT ----------
      - name: Checkout code
        uses: actions/checkout@v4

      # ---------- PYTHON ----------
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r api/requirements.txt
          pip install httpx pytest-cov flake8 fastapi

      - name: Run Flake8
        run: python -m flake8 . --exit-zero

      - name: Run Pytest with coverage
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)
          pytest --cov=api --cov-report=xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

      # ---------- NODE ----------
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install frontend deps
        run: |
          if [ -d frontend ]; then
            cd frontend
            npm install
          fi

      - name: Run ESLint (if exists)
        run: |
          if [ -d frontend ]; then
            cd frontend
            if [ -f package.json ]; then
              npm install eslint || true
              npx eslint . || true
            fi
          fi

      # ---------- DOCKER ----------
      - name: Install hadolint
        run: |
          wget -O hadolint https://github.com
          chmod +x hadolint
          sudo mv hadolint /usr/local/bin/

      - name: Lint Dockerfiles
        run: |
          # Matches your lowercase 'api' folder
          hadolint api/Dockerfile || true
          hadolint worker/Dockerfile || true
          hadolint frontend/Dockerfile || true

      # ---------- SECURITY SCAN ----------
      - name: Install Trivy
        run: |
          sudo apt-get install -y wget apt-transport-https gnupg lsb-release
          wget -qO - https://github.io | gpg --dearmor | sudo tee /usr/share/keyrings/trivy.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://github.io $(lsb_release -sc) main" | sudo tee -a /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install -y trivy

      - name: Run Trivy scan
        run: trivy fs --exit-code 0 .

      # ---------- FINAL CHECK ----------
      - name: Validate docker-compose
        run: docker compose config
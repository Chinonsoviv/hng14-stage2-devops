name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-test:

    runs-on: ubuntu-latest

    steps:
      # ---------- CHECKOUT ----------
      - name: Checkout code
        uses: actions/checkout@v4

      # ---------- PYTHON ----------
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pytest pytest-cov redis

      - name: Run Flake8
        run: python -m flake8 .

      - name: Run Pytest with coverage
        run: |
          pytest --cov=. --cov-report=xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

      # ---------- NODE ----------
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install frontend deps
        run: |
          if [ -d frontend ]; then
            cd frontend
            npm install
          fi

      - name: Run ESLint (if exists)
        run: |
          if [ -d frontend ]; then
            cd frontend
            if [ -f package.json ]; then
              npm install eslint || true
              npx eslint . || true
            fi
          fi

      # ---------- DOCKER ----------
      - name: Install hadolint
        run: |
          wget -O hadolint https://github.com/hadolint/hadolint/releases/latest/download/hadolint-Linux-x86_64
          chmod +x hadolint
          sudo mv hadolint /usr/local/bin/

      - name: Lint Dockerfiles
        run: |
          hadolint API/Dockerfile || true
          hadolint worker/Dockerfile || true
          hadolint frontend/Dockerfile || true

      # ---------- SECURITY SCAN ----------
      - name: Install Trivy
        run: |
          sudo apt-get install -y wget apt-transport-https gnupg lsb-release
          wget https://aquasecurity.github.io/trivy-repo/deb/public.key
          sudo apt-key add public.key
          echo "deb https://aquasecurity.github.io/trivy-repo/deb generic main" | sudo tee -a /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install -y trivy

      - name: Run Trivy scan
        run: trivy fs --exit-code 0 .

      # ---------- FINAL CHECK ----------
      - name: Validate docker-compose
        run: docker compose config
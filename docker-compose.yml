services:
  redis:
    image: redis:7-alpine
    container_name: redis
    networks:
      - hng_network
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.2"
          memory: 256M

  api:
    build: ./api
    container_name: api
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - REDIS_HOST=${REDIS_HOST:-redis}
      - APP_ENV=${APP_ENV:-production}
    networks:
      - hng_network
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

  worker:
    build: ./worker
    container_name: worker
    depends_on:
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
    environment:
      - REDIS_HOST=redis
    networks:
      - hng_network
    restart: always
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

  frontend:
    build: ./frontend
    container_name: frontend
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - hng_network
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

networks:
  hng_network:
    name: hng_network